# OpenOCD Configuration for STM32F407 with JLink + SWD
# Usage: openocd -f interface/jlink.cfg -f target/stm32f4x.cfg -c "program build/Release/robot_arm_3d.elf verify reset exit"

source [find interface/jlink.cfg]

# SWD interface (no reset line, use software reset)
transport select swd

# STM32F4x target
source [find target/stm32f4x.cfg]

# Optional: Reduce speed if communication issues
# adapter speed 1000

# Optional: Enable debug logs
# debug_level 3
